name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.3.0). If omitted, auto-increments from the latest tag.'
        required: false
      bump:
        description: 'Force bump type (patch|minor|major). If omitted, auto-detects from commit messages.'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit is a bot version-bump commit (contains [skip release])
    # or if the commit message explicitly requests skipping.
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          INPUT_BUMP="${{ github.event.inputs.bump || 'auto' }}"

          latest_tag=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "v0.0.0")
          latest_tag_num="${latest_tag#v}"
          echo "Latest tag: $latest_tag"

          IFS='.' read -r major minor patch <<< "$latest_tag_num"

          if [[ "$latest_tag_num" == "0.0.0" ]]; then
            log_range="HEAD"
          else
            log_range="${latest_tag}..HEAD"
          fi

          commits=$(git log --format='%s' "$log_range" 2>/dev/null || echo "")
          if [[ -z "$commits" ]]; then
            echo "No new commits since $latest_tag; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$INPUT_VERSION" ]]; then
            new_version="${INPUT_VERSION#v}"
            echo "Using manually specified version: v$new_version"
          else
            case "$INPUT_BUMP" in
              major)  major=$((major+1)); minor=0; patch=0 ;;
              minor)  minor=$((minor+1)); patch=0 ;;
              patch)  patch=$((patch+1)) ;;
              auto)
                if echo "$commits" | grep -qiE 'BREAKING CHANGE|^major:|breaking:'; then
                  major=$((major+1)); minor=0; patch=0
                  echo "Detected breaking change -> major bump"
                elif echo "$commits" | grep -qiE '^feat'; then
                  minor=$((minor+1)); patch=0
                  echo "Detected feat: commit -> minor bump"
                else
                  patch=$((patch+1))
                  echo "Default -> patch bump"
                fi
                ;;
              *) patch=$((patch+1)) ;;
            esac
            new_version="${major}.${minor}.${patch}"
            echo "Auto-computed next version: v$new_version (from $latest_tag)"
          fi

          echo "new_version=v$new_version" >> "$GITHUB_OUTPUT"
          echo "new_version_num=$new_version" >> "$GITHUB_OUTPUT"

      - name: Skip release (no new commits)
        if: steps.version.outputs.skip == 'true'
        run: echo "Nothing to release."

      - name: Bump Version in constants.go and commit
        if: steps.version.outputs.skip != 'true'
        id: bump
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          sed -i.bak -E "s/^var Version = .*/var Version = \"${NEW_VERSION}\"/" utils/constants.go
          rm -f utils/constants.go.bak
          grep "var Version" utils/constants.go
          git add utils/constants.go
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip release]"
          git push origin main
          NEW_SHA=$(git rev-parse HEAD)
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
          echo "Committed version bump to ${NEW_VERSION} at $NEW_SHA"

      - name: Build all targets
        if: steps.version.outputs.skip != 'true'
        run: |
          ./build.sh "${{ steps.version.outputs.new_version }}"

      - name: Verify artifacts exist
        if: steps.version.outputs.skip != 'true'
        run: |
          ls -1 build/
          for f in pancake-linux-amd64 pancake-linux-arm64 pancake-darwin-amd64 \
                   pancake-darwin-arm64 pancake-windows-amd64.exe \
                   pancake-windows-arm64.exe checksums.txt readme.txt; do
            test -f "build/$f" || { echo "Missing artifact: $f"; exit 1; }
          done

      - name: Smoke-test linux-amd64 binary
        if: steps.version.outputs.skip != 'true'
        run: |
          ./build/pancake-linux-amd64 version
          ./build/pancake-linux-amd64 --help

      - name: Create tag and publish GitHub release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          target_commitish: ${{ steps.bump.outputs.new_sha }}
          generate_release_notes: true
          files: |
            build/pancake-linux-amd64
            build/pancake-linux-arm64
            build/pancake-darwin-amd64
            build/pancake-darwin-arm64
            build/pancake-windows-amd64.exe
            build/pancake-windows-arm64.exe
            build/checksums.txt
            build/readme.txt

      - name: Release summary
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "Release ${{ steps.version.outputs.new_version }} published."
          echo "Assets uploaded to https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.new_version }}"
