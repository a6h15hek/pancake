name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0), without leading v is also accepted'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'

      - name: Resolve version
        id: resolve_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME}"
          fi
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Build all targets with checksums
        run: |
          ./build.sh "v${{ steps.resolve_version.outputs.version }}"

      - name: Verify artifacts
        run: |
          ls -1 build/
          test -f build/checksums.txt
          test -f build/pancake-linux-amd64
          test -f build/pancake-linux-arm64
          test -f build/pancake-darwin-amd64
          test -f build/pancake-darwin-arm64
          test -f build/pancake-windows-amd64.exe
          test -f build/pancake-windows-arm64.exe

      - name: Smoke-test linux-amd64 binary
        run: |
          ./build/pancake-linux-amd64 version
          ./build/pancake-linux-amd64 --help

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve_version.outputs.version }}
          name: v${{ steps.resolve_version.outputs.version }}
          generate_release_notes: true
          files: |
            build/pancake-linux-amd64
            build/pancake-linux-arm64
            build/pancake-darwin-amd64
            build/pancake-darwin-arm64
            build/pancake-windows-amd64.exe
            build/pancake-windows-arm64.exe
            build/checksums.txt
            build/readme.txt
