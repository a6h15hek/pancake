name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -v ./...

  e2e-macos-linux:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'
      - name: Ensure git is available (for sync tests)
        run: git --version
      - name: Run e2e harness
        run: |
          chmod +x test/*.sh
          ./test/run_all.sh

  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23.4'
      - name: Parse-check windows.ps1 installer
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("$PWD/windows.ps1", [ref]$null, [ref]$errors)
          if ($errors) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
      - name: Run Windows e2e tests
        shell: pwsh
        run: |
          ./test/windows_test.ps1
